<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#0a0a0a"/>

  <!-- Left boxing glove -->
  <g transform="translate(100, 120) rotate(-15, 80, 120)">
    <!-- Wrist/cuff -->
    <rect x="45" y="185" width="70" height="50" rx="8" fill="#8B0000"/>
    <rect x="40" y="175" width="80" height="20" rx="5" fill="#DC143C"/>

    <!-- Main glove body -->
    <ellipse cx="80" cy="120" rx="75" ry="80" fill="#DC143C"/>
    <ellipse cx="80" cy="120" rx="75" ry="80" fill="url(#gloveGradientL)"/>

    <!-- Thumb -->
    <ellipse cx="148" cy="95" rx="22" ry="35" transform="rotate(25, 148, 95)" fill="#C41230"/>

    <!-- Highlight -->
    <ellipse cx="65" cy="95" rx="35" ry="30" fill="#E8354A" opacity="0.5"/>
  </g>

  <!-- Right boxing glove -->
  <g transform="translate(200, 100) rotate(15, 130, 120)">
    <!-- Wrist/cuff -->
    <rect x="95" y="185" width="70" height="50" rx="8" fill="#8B0000"/>
    <rect x="90" y="175" width="80" height="20" rx="5" fill="#DC143C"/>

    <!-- Main glove body -->
    <ellipse cx="130" cy="120" rx="75" ry="80" fill="#DC143C"/>
    <ellipse cx="130" cy="120" rx="75" ry="80" fill="url(#gloveGradientR)"/>

    <!-- Thumb -->
    <ellipse cx="62" cy="95" rx="22" ry="35" transform="rotate(-25, 62, 95)" fill="#C41230"/>

    <!-- Highlight -->
    <ellipse cx="145" cy="95" rx="35" ry="30" fill="#E8354A" opacity="0.5"/>
  </g>

  <!-- Gradients for 3D effect -->
  <defs>
    <radialGradient id="gloveGradientL" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#E8354A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B0000" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="gloveGradientR" cx="60%" cy="35%">
      <stop offset="0%" stop-color="#E8354A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B0000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
</svg>
